<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Owl body -->
  <ellipse cx="20" cy="24" rx="12" ry="13" fill="#0B0E14" stroke="#F5A623" stroke-width="1.5"/>
  <!-- Owl head -->
  <ellipse cx="20" cy="12" rx="9" ry="9" fill="#0B0E14" stroke="#F5A623" stroke-width="1.5"/>
  <!-- Left ear tuft -->
  <polygon points="13,5 11,1 15,4" fill="#F5A623"/>
  <!-- Right ear tuft -->
  <polygon points="27,5 29,1 25,4" fill="#F5A623"/>
  <!-- Left eye outer -->
  <circle cx="16" cy="12" r="3.5" fill="#1E2333" stroke="#00E5FF" stroke-width="1.2"/>
  <!-- Right eye outer -->
  <circle cx="24" cy="12" r="3.5" fill="#1E2333" stroke="#00E5FF" stroke-width="1.2"/>
  <!-- Left pupil -->
  <circle cx="16" cy="12" r="1.6" fill="#00E5FF"/>
  <!-- Right pupil -->
  <circle cx="24" cy="12" r="1.6" fill="#00E5FF"/>
  <!-- Beak -->
  <polygon points="20,15 18,18 22,18" fill="#F5A623"/>
  <!-- Wing left -->
  <path d="M8 22 Q5 27 8 33 Q12 26 14 22Z" fill="#1E2333" stroke="#F5A623" stroke-width="1"/>
  <!-- Wing right -->
  <path d="M32 22 Q35 27 32 33 Q28 26 26 22Z" fill="#1E2333" stroke="#F5A623" stroke-width="1"/>
  <!-- Chest pattern -->
  <ellipse cx="20" cy="27" rx="5" ry="6" fill="#1E2333" opacity="0.7"/>
  <!-- Feet left -->
  <path d="M16 36 L14 39 M16 36 L16 39 M16 36 L18 39" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Feet right -->
  <path d="M24 36 L22 39 M24 36 L24 39 M24 36 L26 39" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
</svg>
